# Weekly Placement Prep Skill Refresh
# Triggers every Sunday at midnight and can be run manually

name: Weekly Job Scrape

on:
  schedule:
    - cron: "0 0 * * 0"  # Every Sunday at 00:00 UTC
  workflow_dispatch:      # Manual trigger

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scraper/scrape_jobs.py

      - name: Run Processor (AI Extraction)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python processor/extract_skills.py

      - name: Commit and Push Database changes
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git diff --quiet || (git add data/ && git commit -m "Auto: refresh $(date)" && git push)
        
      - name: Post-run failure check
        if: failure()
        run: echo "The weekly refresh task has FAILED. Check API logs or site structure changes."
